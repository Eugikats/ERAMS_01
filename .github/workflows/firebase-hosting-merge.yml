# Auto-generated by Firebase CLI, extended for Flutter + Supabase
name: Deploy to Firebase Hosting on merge

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'analysis_options.yaml'

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Deploy to Firebase Hosting
        run: |
          # Write service account JSON to a temp file for authentication
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ERAMS_98EB2 }}' > /tmp/sa.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa.json

          # Deploy and capture output; tee to see it live in the log
          npx firebase-tools@13 deploy --only hosting \
            --project erams-98eb2 --non-interactive 2>&1 | tee /tmp/firebase_out.txt
          EXIT=${PIPESTATUS[0]}

          rm -f /tmp/sa.json

          if [ $EXIT -ne 0 ]; then
            if grep -q "is the current active version" /tmp/firebase_out.txt; then
              echo "Site content unchanged — already up to date. Treating as success."
              exit 0
            fi
            echo "::error::Firebase deploy failed (see output above)."
            exit $EXIT
          fi
