org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
# Gradle 8.13 (paired with AGP 8.13.2, see settings.gradle.kts) needs a JDK
# 17-21 to launch its daemon — it won't run under newer JDKs (e.g. 25). If
# your default `java` is too new, set org.gradle.java.home to a JDK 17/21
# install in your user-global ~/.gradle/gradle.properties (NOT this file —
# that path is machine-specific and shouldn't be committed).
android.useAndroidX=true
# Kotlin's incremental compiler cache tries to relativize file paths, which
# throws "this and base files have different roots" when the project (E:\)
# and the Gradle/pub-cache (C:\) are on different Windows drives. Disabling
# incremental compilation avoids the crash (slower clean builds, not an issue
# for one-off release builds).
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
