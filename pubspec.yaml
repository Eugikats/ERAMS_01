name: erams
description: Emergency Response and Ambulance Management System
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.0.0

  # State management
  flutter_riverpod: ^2.0.0
  riverpod_annotation: ^2.0.0

  # Routing
  go_router: ^13.0.0

  # Maps (OpenStreetMap, zero-cost)
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Location (driver GPS)
  geolocator: ^11.0.0

  # Offline storage (queue for location updates when offline)
  hive_flutter: ^1.1.0

  # Charts (admin analytics)
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.0.0
  riverpod_generator: ^2.0.0

flutter:
  uses-material-design: true
