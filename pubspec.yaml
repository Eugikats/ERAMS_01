name: erams
description: Emergency Response and Ambulance Management System
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Web URL strategy (path-based routing instead of hash, so Supabase's
  # #access_token=... auth links don't collide with go_router)
  flutter_web_plugins:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.0.0

  # State management
  flutter_riverpod: ^2.0.0
  riverpod_annotation: ^2.0.0

  # Routing
  go_router: ^13.0.0

  # Maps (OpenStreetMap, zero-cost)
  flutter_map: ^6.0.0
  latlong2: ^0.9.0

  # Location (driver GPS)
  geolocator: ^11.0.0

  # External app launch (Google Maps navigation deep link)
  url_launcher: ^6.0.0

  # Turn-by-turn road routing (shortest path between patient and ambulance)
  http: ^1.2.0

  # Offline storage (queue for location updates when offline)
  hive_flutter: ^1.1.0

  # Charts (admin analytics)
  fl_chart: ^0.68.0

  # Voice & video calls (Phase 18)
  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.0.0
  riverpod_generator: ^2.0.0

flutter:
  uses-material-design: true
